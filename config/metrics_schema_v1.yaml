version: 1
metrics:
- metric_id: dau
  metric_name: 日活跃用户数 (DAU)
  level:
  - 公司
  owner:
  - ceo
  - marketing
  business_domain: Platform Basics
  role: Driver
  definition: 当日去重活跃用户数
  description: 表示用户规模是否健康
  is_core_metric: true
  metric_nature: additive
  value_kind: number
  value_unit: users
  format:
    humanize: true
    decimals: 0
  if_error: false
  time_range: last_30_days
  data_granularity: daily
  analysis_perspective: series
  evaluation:
    method: higher_is_better
  anomaly_detection:
    change_anomaly:
      enabled: true
    status_anomaly:
      enabled: false
  related_metrics:
  - new_user
  - retention(d1)
  compute_plan:
    series:
      enabled: true
      items:
      - id: series_daily
        series_days: 30
        dim:
        - source
        - country
    topk:
      enabled: false
    share:
      enabled: false
  viz:
    items:
    - id: series_daily
      style: default
      dim_control:
        enabled: true
        dim:
        - source
        - country
  interpretation:
    summary_hint:
    - 关注用户规模的变化趋势
    - 'good_direction: higher_is_better'
    common_drivers:
    - 用户增长
    - 市场活动
    drilldown_path:
    - 按国家分析
    - 按来源分析
